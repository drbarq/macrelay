name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Universal Binaries
        run: |
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          mkdir -p bin
          lipo -create \
            target/x86_64-apple-darwin/release/macrelay \
            target/aarch64-apple-darwin/release/macrelay \
            -output bin/macrelay
          lipo -create \
            target/x86_64-apple-darwin/release/macrelay-menubar \
            target/aarch64-apple-darwin/release/macrelay-menubar \
            -output bin/macrelay-menubar
          chmod +x bin/macrelay bin/macrelay-menubar

      - name: Package App Bundle
        run: |
          APP_DIR="dist/MacRelay.app"
          CONTENTS="${APP_DIR}/Contents"
          VERSION="${GITHUB_REF_NAME#v}"

          rm -rf "$APP_DIR"
          mkdir -p "${CONTENTS}/MacOS" "${CONTENTS}/Resources"

          cp bin/macrelay "${CONTENTS}/MacOS/macrelay"
          cp bin/macrelay-menubar "${CONTENTS}/MacOS/macrelay-menubar"
          cp assets/macrelay.icns "${CONTENTS}/Resources/macrelay.icns"

          mkdir -p "${CONTENTS}/Resources/mcpb/server"
          cp mcpb/manifest.json "${CONTENTS}/Resources/mcpb/manifest.json"
          cp mcpb/icon.png "${CONTENTS}/Resources/mcpb/icon.png"
          ln -s ../../../MacOS/macrelay "${CONTENTS}/Resources/mcpb/server/macrelay"

          cat > "${CONTENTS}/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>MacRelay</string>
              <key>CFBundleDisplayName</key>
              <string>MacRelay</string>
              <key>CFBundleIdentifier</key>
              <string>com.macrelay.app</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleExecutable</key>
              <string>macrelay-menubar</string>
              <key>CFBundleIconFile</key>
              <string>macrelay</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>LSUIElement</key>
              <true/>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          PLIST

          cd dist
          zip -r MacRelay.zip MacRelay.app
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/macrelay
            bin/macrelay-menubar
            dist/MacRelay.zip

      - name: Update Homebrew Tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(shasum -a 256 dist/MacRelay.zip | awk '{print $1}')

          git clone https://x-access-token:${TAP_TOKEN}@github.com/drbarq/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          cat > Casks/macrelay.rb << CASK
          cask "macrelay" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/drbarq/macrelay/releases/download/v#{version}/MacRelay.zip"
            name "MacRelay"
            desc "Open-source MCP server for native macOS apps — with menu bar manager"
            homepage "https://github.com/drbarq/macrelay"

            depends_on macos: ">= :sonoma"

            app "MacRelay.app"

            postflight do
              system "xattr", "-cr", "#{appdir}/MacRelay.app"
              system "open", "#{appdir}/MacRelay.app"
            end

            uninstall quit: "com.macrelay.app"

            zap trash: [
              "~/Library/Application Support/MacRelay",
              "~/Library/LaunchAgents/com.macrelay.menubar.plist",
              "~/Library/Application Support/Claude/Claude Extensions/com.macrelay.app",
              "~/Library/Application Support/Claude/Claude Extensions Settings/com.macrelay.app.json",
            ]
          end
          CASK

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/macrelay.rb
          git commit -m "Bump MacRelay to v${VERSION}"
          git push
