name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Import Apple Certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain for CI
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="ci-keychain-$(date +%s)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the certificate
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Verify
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build Universal Binaries
        run: |
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          mkdir -p bin
          lipo -create \
            target/x86_64-apple-darwin/release/macrelay \
            target/aarch64-apple-darwin/release/macrelay \
            -output bin/macrelay
          lipo -create \
            target/x86_64-apple-darwin/release/macrelay-menubar \
            target/aarch64-apple-darwin/release/macrelay-menubar \
            -output bin/macrelay-menubar
          chmod +x bin/macrelay bin/macrelay-menubar

      - name: Package and Sign App Bundle
        run: |
          APP_DIR="dist/MacRelay.app"
          CONTENTS="${APP_DIR}/Contents"
          VERSION="${GITHUB_REF_NAME#v}"
          IDENTITY="Developer ID Application: Joseph Tustin (X98GWB4NWD)"

          rm -rf "$APP_DIR"
          mkdir -p "${CONTENTS}/MacOS" "${CONTENTS}/Resources"

          cp bin/macrelay "${CONTENTS}/MacOS/macrelay"
          cp bin/macrelay-menubar "${CONTENTS}/MacOS/macrelay-menubar"
          cp assets/macrelay.icns "${CONTENTS}/Resources/macrelay.icns"

          mkdir -p "${CONTENTS}/Resources/mcpb/server"
          cp mcpb/manifest.json "${CONTENTS}/Resources/mcpb/manifest.json"
          cp mcpb/icon.png "${CONTENTS}/Resources/mcpb/icon.png"
          cp bin/macrelay "${CONTENTS}/Resources/mcpb/server/macrelay"

          cat > "${CONTENTS}/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>MacRelay</string>
              <key>CFBundleDisplayName</key>
              <string>MacRelay</string>
              <key>CFBundleIdentifier</key>
              <string>com.macrelay.app</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleExecutable</key>
              <string>macrelay-menubar</string>
              <key>CFBundleIconFile</key>
              <string>macrelay</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>LSUIElement</key>
              <true/>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSAppleEventsUsageDescription</key>
              <string>MacRelay drives Notes, Calendar, Mail, Reminders, and other Apple apps via AppleScript so that AI assistants can read and write your data on your behalf.</string>
              <key>NSCalendarsUsageDescription</key>
              <string>MacRelay reads and creates calendar events on your behalf.</string>
              <key>NSContactsUsageDescription</key>
              <string>MacRelay reads your contacts so AI assistants can look up phone numbers, emails, and addresses.</string>
              <key>NSRemindersUsageDescription</key>
              <string>MacRelay reads and creates reminders on your behalf.</string>
          </dict>
          </plist>
          PLIST

          # Sign every executable in the bundle individually
          codesign --sign "$IDENTITY" \
            --options runtime \
            --entitlements macrelay.entitlements \
            --identifier "com.macrelay.server" \
            --force \
            "${CONTENTS}/MacOS/macrelay"

          codesign --sign "$IDENTITY" \
            --options runtime \
            --entitlements macrelay.entitlements \
            --identifier "com.macrelay.server" \
            --force \
            "${CONTENTS}/Resources/mcpb/server/macrelay"

          # Sign the full .app bundle (signs menubar binary with bundle ID)
          codesign --sign "$IDENTITY" \
            --options runtime \
            --entitlements macrelay.entitlements \
            --force \
            "$APP_DIR"

          # Verify
          codesign --verify --deep --strict "$APP_DIR"

          # Zip for release
          cd dist
          zip -r MacRelay.zip MacRelay.app
          cd ..

      - name: Notarize App
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: X98GWB4NWD
        run: |
          if [ -n "$APPLE_ID" ] && [ -n "$APPLE_ID_PASSWORD" ]; then
            # Submit for notarization and wait for Apple to process
            xcrun notarytool submit dist/MacRelay.zip \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait || { echo "Notarization REJECTED by Apple"; exit 1; }

            # Staple the notarization ticket to the .app (not the zip)
            # Staple needs the actual .app, so unzip, staple, re-zip
            unzip -o dist/MacRelay.zip -d dist/staple-tmp

            # Retry stapling — Apple's CDN can take a moment to propagate
            for i in 1 2 3 4 5; do
              if xcrun stapler staple dist/staple-tmp/MacRelay.app 2>&1; then
                echo "Stapling succeeded on attempt $i"
                break
              fi
              echo "Stapling attempt $i failed, waiting 15s..."
              sleep 15
            done

            # Re-zip with stapled app
            cd dist/staple-tmp
            zip -r ../MacRelay.zip MacRelay.app
            cd ../..
            rm -rf dist/staple-tmp

            echo "Notarization and stapling complete"
          else
            echo "APPLE_ID/APPLE_ID_PASSWORD not set — skipping notarization (signing still applied)"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/macrelay
            bin/macrelay-menubar
            dist/MacRelay.zip

      - name: Update Homebrew Tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(shasum -a 256 dist/MacRelay.zip | awk '{print $1}')

          git clone https://x-access-token:${TAP_TOKEN}@github.com/drbarq/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          cat > Casks/macrelay.rb << CASK
          cask "macrelay" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/drbarq/macrelay/releases/download/v#{version}/MacRelay.zip"
            name "MacRelay"
            desc "Open-source MCP server for native macOS apps — with menu bar manager"
            homepage "https://github.com/drbarq/macrelay"

            depends_on macos: ">= :sonoma"

            app "MacRelay.app"

            postflight do
              system "open", "#{appdir}/MacRelay.app"
            end

            uninstall quit: "com.macrelay.app"

            zap trash: [
              "~/Library/Application Support/MacRelay",
              "~/Library/LaunchAgents/com.macrelay.menubar.plist",
              "~/Library/Application Support/Claude/Claude Extensions/com.macrelay.app",
              "~/Library/Application Support/Claude/Claude Extensions Settings/com.macrelay.app.json",
            ]
          end
          CASK

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/macrelay.rb
          git commit -m "Bump MacRelay to v${VERSION}"
          git push

      - name: Cleanup Keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
